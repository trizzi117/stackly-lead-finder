# ─────────────────────────────────────────────────────────────
# Пресеты ниш: ключевые слова (триггеры намерения) + стоп-слова (шум).
# Пред-фильтр дешёвый: если есть хоть один keyword И нет ни одного
# stop_word — сообщение идёт на дорогую AI-классификацию.
# Подбирай фразы под РЕАЛЬНЫЙ язык покупателя, а не под себя.
# ─────────────────────────────────────────────────────────────

