<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stackly Lead Finder — Дашборд</title>
<style>
  :root{
    --bg:#f5f7fb; --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --brand:#2563eb; --brand-d:#1d4ed8;
    --hot:#ef4444; --warm:#f59e0b; --cold:#94a3b8;
    --hot-bg:#fef2f2; --warm-bg:#fffbeb; --cold-bg:#f8fafc;
    --shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif}
  header{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}
  .top{display:flex;align-items:center;gap:12px;padding:16px 0}
  .logo{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.02em}
  .logo b{color:var(--brand)}
  .dot{width:9px;height:9px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 4px #22c55e22}
  .niche{margin-left:auto;color:var(--muted);font-size:13px}
  .reload{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;
    cursor:pointer;color:var(--ink);font-weight:600}
  .reload:hover{border-color:var(--brand);color:var(--brand)}

  .cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:22px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
  .stat .n{font-size:26px;font-weight:800;letter-spacing:-.02em}
  .stat .l{color:var(--muted);font-size:12.5px;margin-top:2px}
  .stat.hot .n{color:var(--hot)} .stat.warm .n{color:var(--warm)} .stat.cold .n{color:var(--cold)}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 14px;
    cursor:pointer;font-weight:600;font-size:13.5px;color:var(--muted)}
  .chip.on{background:var(--brand);border-color:var(--brand);color:#fff}

  .lead{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;
    margin-bottom:12px;box-shadow:var(--shadow)}
  .lead.hot{border-left:4px solid var(--hot)} .lead.warm{border-left:4px solid var(--warm)}
  .lead.cold{border-left:4px solid var(--cold)}
  .lhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .badge{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
  .badge.hot{background:var(--hot-bg);color:var(--hot)} .badge.warm{background:var(--warm-bg);color:var(--warm)}
  .badge.cold{background:var(--cold-bg);color:var(--cold)}
  .score{font-weight:800;font-size:13px;color:var(--muted)}
  .who{font-weight:700} .chat{color:var(--muted);font-size:13px}
  .when{margin-left:auto;color:var(--muted);font-size:12.5px}
  .text{margin:11px 0;padding:10px 12px;background:#f8fafc;border-radius:10px;border:1px solid var(--line)}
  .intent{font-size:13.5px;color:var(--muted);margin-bottom:8px}
  .intent b{color:var(--ink)}
  .reply{background:#eff4ff;border:1px solid #dbe6ff;border-radius:10px;padding:11px 12px;font-size:14px}
  .reply .cap{font-size:11.5px;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}
  .btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;cursor:pointer;font-weight:600;font-size:13px;color:var(--ink)}
  .btn:hover{border-color:var(--brand);color:var(--brand)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--brand-d)}
  .btn.on{background:#0f172a;border-color:#0f172a;color:#fff}
  a.tg{margin-left:auto;color:var(--brand);text-decoration:none;font-weight:600;font-size:13px}
  .status-pill{font-size:11.5px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 9px}
  .empty{text-align:center;color:var(--muted);padding:60px 0}
  .empty h3{color:var(--ink);margin:0 0 6px}
  footer{color:var(--muted);font-size:12.5px;text-align:center;padding:30px 0}
  @media(max-width:760px){.cards{grid-template-columns:repeat(2,1fr)}.when{width:100%;margin:0}}
</style>
</head>
<body>
<header>
  <div class="wrap top">
    <div class="logo"><span class="dot"></span> <span>Stackly <b>Lead Finder</b></span></div>
    <span class="niche" id="niche">—</span>
    <button class="reload" onclick="loadAll()">↻ Обновить</button>
  </div>
</header>

<main class="wrap">
  <div class="cards" id="cards"></div>

  <div class="toolbar" id="filters">
    <button class="chip on" data-f="all">Все</button>
    <button class="chip" data-f="hot">🔥 Горячие</button>
    <button class="chip" data-f="warm">🌤 Тёплые</button>
    <button class="chip" data-f="cold">❄️ Холодные</button>
    <span style="width:1px;background:var(--line);margin:0 4px"></span>
    <button class="chip" data-s="new">Новые</button>
    <button class="chip" data-s="contacted">В работе</button>
    <button class="chip" data-s="converted">Закрытые</button>
  </div>

  <div id="list"></div>
</main>

<footer>Stackly Lead Finder · твой следующий клиент уже пишет в чат</footer>

<script>
let curClass = "all", curStatus = "all";

const esc = s => (s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const LABEL = {hot:"Горячий",warm:"Тёплый",cold:"Холодный"};

function when(iso){
  if(!iso) return "";
  const d = new Date(iso); const diff = (Date.now()-d)/1000;
  if(diff<3600) return Math.max(1,Math.floor(diff/60))+" мин назад";
  if(diff<86400) return Math.floor(diff/3600)+" ч назад";
  return d.toLocaleDateString("ru-RU",{day:"numeric",month:"short"});
}

async function loadStats(){
  const s = await (await fetch("/api/stats")).json();
  document.getElementById("niche").textContent = "Ниша: " + (s.niche||"—");
  const c = s.by_class||{};
  document.getElementById("cards").innerHTML = `
    <div class="stat"><div class="n">${s.today||0}</div><div class="l">Лидов сегодня</div></div>
    <div class="stat"><div class="n">${s.total||0}</div><div class="l">Всего</div></div>
    <div class="stat hot"><div class="n">${c.hot||0}</div><div class="l">🔥 Горячих</div></div>
    <div class="stat warm"><div class="n">${c.warm||0}</div><div class="l">🌤 Тёплых</div></div>
    <div class="stat cold"><div class="n">${c.cold||0}</div><div class="l">❄️ Холодных</div></div>`;
}

async function loadLeads(){
  const q = new URLSearchParams({classification:curClass, status:curStatus, limit:200});
  const leads = await (await fetch("/api/leads?"+q)).json();
  const list = document.getElementById("list");
  if(!leads.length){
    list.innerHTML = `<div class="empty"><h3>Пока пусто</h3>
      <div>Запусти воркер (<code>python -m src.worker</code>) или демо (<code>python -m scripts.seed_demo</code>).</div></div>`;
    return;
  }
  list.innerHTML = leads.map(renderLead).join("");
}

function renderLead(l){
  const who = l.username ? `${esc(l.sender_name)} <span class="chat">@${esc(l.username)}</span>` : esc(l.sender_name);
  const reply = l.reply ? `<div class="reply"><div class="cap">✍️ Готовый ответ</div>
      <div id="rp${l.id}">${esc(l.reply)}</div>
      <div class="row"><button class="btn" onclick="copyReply(${l.id})">⧉ Копировать</button></div></div>` : "";
  const tg = l.link ? `<a class="tg" href="${esc(l.link)}" target="_blank">Открыть в Telegram →</a>` : "";
  const st = l.status||"new";
  const sbtn = (val,txt)=>`<button class="btn ${st===val?'on':''}" onclick="setStatus(${l.id},'${val}')">${txt}</button>`;
  return `<div class="lead ${l.classification}">
    <div class="lhead">
      <span class="badge ${l.classification}">${LABEL[l.classification]||l.classification}</span>
      <span class="score">${l.score??0}/100</span>
      <span class="who">${who}</span>
      <span class="chat">· ${esc(l.chat_title)}</span>
      <span class="when">${when(l.created_at)}</span>
    </div>
    <div class="text">${esc(l.text)}</div>
    ${l.intent?`<div class="intent">🧠 <b>${esc(l.intent)}</b>${l.keyword?` · ключ: «${esc(l.keyword)}»`:""}</div>`:""}
    ${reply}
    <div class="row">
      ${sbtn("new","Новый")}${sbtn("contacted","Написал")}${sbtn("converted","Клиент")}${sbtn("dismissed","Мимо")}
      ${tg}
    </div>
  </div>`;
}

async function copyReply(id){
  const t = document.getElementById("rp"+id).textContent;
  try{ await navigator.clipboard.writeText(t); toast("Ответ скопирован"); }
  catch{ toast("Не удалось скопировать"); }
}
async function setStatus(id,status){
  await fetch(`/api/leads/${id}/status`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({status})});
  loadAll();
}
function toast(msg){
  const t=document.createElement("div"); t.textContent=msg;
  t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 18px;border-radius:10px;z-index:99;font-weight:600";
  document.body.appendChild(t); setTimeout(()=>t.remove(),1600);
}

document.getElementById("filters").addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  if(b.dataset.f!==undefined){
    curClass=b.dataset.f;
    document.querySelectorAll("[data-f]").forEach(x=>x.classList.toggle("on",x===b));
  }
  if(b.dataset.s!==undefined){
    const was=b.classList.contains("on");
    document.querySelectorAll("[data-s]").forEach(x=>x.classList.remove("on"));
    if(!was){ b.classList.add("on"); curStatus=b.dataset.s; } else { curStatus="all"; }
  }
  loadLeads();
});

function loadAll(){ loadStats(); loadLeads(); }
loadAll();
setInterval(loadAll, 30000); // авто-обновление каждые 30с
</script>
</body>
</html>
