    <div class="cookie-actions">
      <button class="btn ghost sm" onclick="cookieChoice('declined')">Только необходимые</button>
      <button class="btn sm" onclick="cookieChoice('accepted')">Принять все</button>
    </div>
  </div>
</div>
<script>
(function(){
  var bar=document.getElementById('cookie-bar');
  var c=null; try{c=localStorage.getItem('cookie_consent');}catch(e){}
  if(!c){ if(bar) bar.style.display='block'; }
  else if(c==='accepted'){ loadAnalytics(); }
  window.cookieChoice=function(v){
    try{localStorage.setItem('cookie_consent',v);}catch(e){}
    if(bar) bar.style.display='none';
    if(v==='accepted') loadAnalytics();
  };
